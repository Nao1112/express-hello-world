<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <style>
        .chat {
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .form {
            display: flex;
        }

        .input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
        }

        .submit {
            padding: 10px;
            border: 1px solid #ccc;
            background: #eee;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="chat">
        <ul class="messages"></ul>
        <form class="form">
            <input class="input" autocomplete="off" />
            <button class="submit">Send</button>
        </form>
    </div>
    <label>
        <input type="color" id="colorPicker" value="#000000">
    </label>
    <button id="clearCanvas">クリア</button>
    <button id="sendCanvas">絵を送信</button>
    <canvas id="canvas" width="600" height="600" style="border: solid 1px black"></canvas>

    <script>
        function main() {
            const host = location.origin.replace(/^http/, 'ws')
            const ws = new WebSocket(host + '/ws')
            const myId = self.crypto.randomUUID().substr(0, 8)

            const canvas = document.getElementById('canvas')
            const ctx = canvas.getContext('2d')
            const colorPicker = document.getElementById('colorPicker')
            const clearCanvasButton = document.getElementById("clearCanvas")
            const sendCanvasButton = document.getElementById("sendCanvas");

            clearCanvasButton.onclick = function () {
                ctx.clearRect(0,0,canvas.width,canvas.height)
            }

            let currentColor = colorPicker.value

            colorPicker.addEventListener('change', () => {
                currentColor = colorPicker.value
            })

            let drawing = false

            canvas.addEventListener('mousedown', (e) => {
                sendDrawingEvent(e.offsetX, e.offsetY, 'mousedown')
            })
            function mousedown() {
                drawing = true
                ctx.beginPath()
            }

            canvas.addEventListener('mousemove', (e) => {
                if (drawing) {
                    sendDrawingEvent(e.offsetX, e.offsetY, 'mousemove')
                }
            })
            function mousemove(x, y, color) {
                if (drawing) {
                    draw(x, y, true, color)
                }
            }

            canvas.addEventListener('mouseup', (e) => {
                sendDrawingEvent(e.offsetX, e.offsetY, 'mouseup')
            })
            function mouseup() {
                drawing = false
                ctx.beginPath()
            }

            canvas.addEventListener('mouseout', (e) => {
                sendDrawingEvent(e.offsetX, e.offsetY, 'mouseout')
            })
            function mouseout() {
                drawing = false
            }

            function draw(x, y, dragging, color) {
                ctx.strokeStyle = color;

                if (dragging) {
                    ctx.lineTo(x, y)
                    ctx.stroke()
                } else {
                    ctx.moveTo(x, y)
                }
            }

            function sendDrawingEvent(x, y, control) {
                const message = JSON.stringify({ x, y, control, color: currentColor, type: 'paint' })
                ws.send(message)
            }

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data)
                if (msg.type === 'paint') {
                    const { x, y, control, color } = msg
                    console.log({ control })
                    if (control === 'mousedown') {
                        mousedown()
                    } else if (control === 'mouseup') {
                        mouseup()
                    } else if (control === 'mousemove') {
                        mousemove(x, y, color)
                    } else if (control === 'mouseout') {
                        mouseout()
                    }
                }
                if (msg.type === 'chat') {
                    const { id, text } = msg
                    const messageList = document.querySelector('.messages')
                    const li = document.createElement('li')
                    if (text.startsWith("data:image")) {
                        const label = document.createElement('div')
                        label.textContent = id === myId ? `(${id})自分の絵` : `${id}の絵`
                        const img = document.createElement('img')
                        img.src = text
                        img.width = 200

                        li.appendChild(label)
                        li.appendChild(img)
                    } else {
                        if (id === myId) {
                            li.textContent = `(${id})自分:` + text
                        } else {
                            li.textContent = id + ': ' + text
                        }
                    }
                    messageList.appendChild(li)
                }
            }

            sendCanvasButton.onclick = function () {
                const imageData = canvas.toDataURL()
                ws.send(JSON.stringify({ id: myId, text: imageData, type: 'chat' }))
            }

            const form = document.querySelector('.form')

            form.onsubmit = function (e) {
                e.preventDefault()
                const input = document.querySelector('.input')
                const text = input.value
                ws.send(JSON.stringify({ id: myId, text, type: 'chat' }))
                input.value = ''
                input.focus()
            }

            ws.onerror = function (error) {
                console.error('WebSocket Error: ', error)
            }
        }

        main()
    </script>
</body>

</html>
